<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 10px; 
        background: #fff; }
    button { cursor: pointer; 
        padding: 10px; 
        background: #18a0fb; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        font-weight: bold; }
    button:hover { background: #0d8de3; }
    pre { background: #f5f5f5; 
        padding: 8px; 
        font-size: 11px; 
        border: 1px solid #ddd; 
        max-height: 150px; 
        overflow: auto; 
        white-space: pre-wrap; }
    label { font-size: 12px; 
        color: #555; }
  </style>
</head>
<body>
  <button id="analyze">Анализировать выбранное</button>
  <button id="export">Экспорт в PNG</button>
  
  <label>Результат (Лог):</label>
  <pre id="output">Выберите фрейм и нажмите кнопку</pre>

  <script>
    document.getElementById('analyze').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'analyze-frame' } }, '*');
    };

    document.getElementById('export').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'export-png' } }, '*');
    };
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'analysis-result') {
        document.getElementById('output').textContent = JSON.stringify(msg.data, null, 2);
      }

      if (msg.type === 'download-png') {
        const blob = new Blob([msg.bytes], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${msg.name}.png`;
        link.click();
      }
    };
  </script>
</body>
</html>
