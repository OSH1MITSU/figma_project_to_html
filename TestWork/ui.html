<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 15px; 
      background: #fff; 
      margin: 0; 
    }
    .controls { 
      position: sticky; 
      top: 0; 
      background: #fff; 
      padding-bottom: 10px; 
      z-index: 10; 
      border-bottom: 1px solid #eee; 
    }
    button { 
      width: 100%; 
      cursor: pointer; 
      padding: 10px; 
      margin-top: 5px;
      background: #18a0fb; 
      color: white; 
      border: none; 
      border-radius: 4px; 
    }
    #copy-btn { 
      background: #18a0fb; 
      display: none; 
    }
    pre { 
      font-size: 11px; 
      background: #f5f5f5; 
      padding: 10px; 
      white-space: pre-wrap; 
      word-wrap: break-word; 
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="analyze">Анализировать всё дерево</button>
    <button id="copy-btn">Скопировать результат (JSON)</button>
    <button id="export" style="background: #18a0fb;">Скачать PNG</button>
  </div>
  
  <pre id="output">Результат появится здесь...</pre>

  <script>
    let lastData = null;

    document.getElementById('analyze').onclick = () => {
      document.getElementById('output').textContent = "Анализирую...";
      parent.postMessage({ pluginMessage: { type: 'analyze-frame' } }, '*');
    };

    document.getElementById('copy-btn').onclick = () => {
      const el = document.createElement('textarea');
      el.value = JSON.stringify(lastData, null, 2);
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      alert("Скопировано в буфер обмена!");
    };

    document.getElementById('export').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'export-png' } }, '*');
    };

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'analysis-result') {
        lastData = msg.data;
        document.getElementById('output').textContent = JSON.stringify(msg.data, null, 2);
        document.getElementById('copy-btn').style.display = "block";
      }
      if (msg.type === 'download-png') {
        const blob = new Blob([msg.bytes], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${msg.name}.png`;
        a.click();
      }
    };
  </script>
</body>
</html>
